<script>
(function(){
  'use strict';
  const canvas=document.getElementById('stage');
  const ctx=canvas.getContext('2d');
  const DPR=window.devicePixelRatio||1;

  // ===== Params =====
  const N0=0; // initial nodes (start empty)
  const R_BASE=110, R_STEP=70, R_JITTER=8;
  const SPEED_BASE=0.8, SPEED_FALLOFF=0.55;
  // Web physics
  const WEB_K=2.0, WEB_DAMP=0.86, WEB_CENTER_PULL=0.18, WEB_REPULSE=2200, WEB_MIN_DIST=36, COLLISION_ITER=2;
  const FOLLOW_K=6.0; // neighbor follow strength
  // Orbit transition/drag
  const ORBIT_TWEEN=1.5, ORBIT_DRAG_DECAY=0.85;
  const ORBIT_RELAYOUT_DUR=1.0; // ring 구조 바뀔 때 매끄러운 보간 시간
  // Hover/Focus UX
  const FOCUS_NEAR_PX=80;   // 근접 확대 시작 거리(스크린 좌표)
  const HOVER_SPEED=10;     // 포커스 보간 속도

  // Camera (world origin = orbit center)
  let camScale=1, camX=0, camY=0, camTX=0, camTY=0, camVX=0, camVY=0;
  let MIN_SCALE=0.4, MAX_SCALE=4.0; const BASE_MIN_SCALE=0.4; const CAM_K=12.0, CAM_C=6.5;
  // wobble of nodes when camera snaps
  let wobbleX=0, wobbleY=0, wobbleVX=0, wobbleVY=0; const WOB_K=22.0, WOB_C=7.5, WOB_GAIN=0.18;

  // ===== State =====
  const SESSION_KEY = 'graphState.v1';
  let nodes=[], edges=[]; let showEdges=true;

// ===== Harmony & Transport =====
let BPM = 100;                // tempo (for chord timeline)
const BEATS_PER_BAR = 4;      // 4/4
const STEPS_PER_BEAT = 4;     // 16th grid (ready for future)
const MS_PER_BEAT = ()=> 60000 / BPM;
let isPlaying = false;
let currentBar = 0;           // 0..CHORD_TIMELINE.length-1
let nextBarDue = 0;           // ms deadline (performance.now)

// Key / Scale (Major) and chord degrees (triads by default)
const KEY = { tonicMidi: 60, mode: 'major' }; // C4 major
const DEGREE_TO_OFFSETS = {
  'I':  [0,4,7],
  'ii': [2,5,9],
  'iii':[4,7,11],
  'IV': [5,9,12],
  'V':  [7,11,14],
  'vi': [9,12,16],
  'vii°':[11,14,17]
};
// Default 4-bar pop progression
const CHORD_TIMELINE = ['I','V','vi','IV'];

function degreeToChord(deg){ const ofs = DEGREE_TO_OFFSETS[deg]||DEGREE_TO_OFFSETS['I']; return ofs.map(o=>KEY.tonicMidi + o); }

// Assign role per ring: bass / chord / upper (octave offsets)
function ringRoleOffset(n){
  const r = Math.hypot(n.x,n.y);
  if(r < 140) return -24; // inner: bass (C2 vicinity)
  if(r < 260) return 0;   // mid: chord tones around C4
  return +12;             // outer: upper extension
}

// Voice-leading: pick nearest pitch to previous
function nearestPitch(prev, candidates){
  if(!isFinite(prev)) return candidates[0];
  let best = candidates[0]; let bd = Infinity;
  for(const c of candidates){ const d = Math.abs(c - prev); if(d < bd){ bd=d; best=c; } }
  return best;
}

// ===== Audio (Web Audio API) =====
const Audio = {
  ctx: null,
  master: null,
  reverb: null,
  compressor: null,
  ensure(){
    if(this.ctx) return;
    const ctx = new (window.AudioContext||window.webkitAudioContext)();

    // Create master gain
    const master = ctx.createGain(); master.gain.value = 0.3; // Adjusted master volume for better audibility

    // Create Reverb (ConvolverNode)
    const reverb = ctx.createConvolver();
    const impulse = this.createImpulseResponse(ctx);
    reverb.buffer = impulse;

    // Create Compressor
    const compressor = ctx.createDynamicsCompressor();
    compressor.threshold.value = -18;
    compressor.knee.value = 20;
    compressor.ratio.value = 12;
    compressor.attack.value = 0.005;
    compressor.release.value = 0.15;

    const dryGain = ctx.createGain();
    const wetGain = ctx.createGain();
    wetGain.gain.value = 0.3; // Default reverb level
    dryGain.gain.value = 0.7;

    // Connect the parallel chains
    master.connect(dryGain);
    master.connect(wetGain);
    wetGain.connect(reverb);

    dryGain.connect(compressor);
    reverb.connect(compressor);
    compressor.connect(ctx.destination);

    this.ctx = ctx;
    this.master = master;
    this.reverb = reverb;
    this.compressor = compressor;
    this.dryGain = dryGain;
    this.wetGain = wetGain;
  },

  createImpulseResponse(ctx) {
    const dur = 1.5; // seconds
    const decay = 0.8; // Reduced decay for less reverb
    const len = ctx.sampleRate * dur;
    const impulse = ctx.createBuffer(2, len, ctx.sampleRate);
    for (let c = 0; c < 2; c++) { // Stereo
      const channel = impulse.getChannelData(c);
      for (let i = 0; i < len; i++) {
        channel[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
      }
    }
    return impulse;
  }
};
function midiToFreq(m){ return 440 * Math.pow(2, (m-69)/12); }
const CHORD_TEMPLATES = {
  'maj':  {name:'maj',  iv:[0,4,7]},
  'min':  {name:'min',  iv:[0,3,7]},
  'sus2': {name:'sus2', iv:[0,2,7]},
  'sus4': {name:'sus4', iv:[0,5,7]},
  '5':    {name:'5',    iv:[0,7,12]},
  'maj7': {name:'maj7', iv:[0,4,7,11]},
  'm7':   {name:'m7',   iv:[0,3,7,10]},
  '7':    {name:'7',    iv:[0,4,7,10]},
  'm7b5': {name:'m7b5', iv:[0,3,6,10]},
};

const SCALES = {
  major: {
    intervals: [0, 2, 4, 5, 7, 9, 11],
    chords: ['maj7', 'm7', 'm7', 'maj7', '7', 'm7', 'm7b5']
  },
  // Could add more scales like minor, dorian, etc. later
};

function assignNodeChords() {
  // 1. Establish a musical key
  const rootNote = 48 + Math.floor(Math.random() * 12); // C3 to B3
  const scale = SCALES.major; // For now, always use major scale

  // 2. Generate a palette of diatonic chords
  const chordPalette = [];
  for (let i = 0; i < scale.intervals.length; i++) {
    const chordRoot = rootNote + scale.intervals[i];
    const chordType = CHORD_TEMPLATES[scale.chords[i]];
    if (!chordType) continue;

    chordPalette.push({
      name: chordType.name,
      midi: chordType.iv.map(iv => chordRoot + iv)
    });
  }

  // 3. Assign a chord from the palette to each node
  if (chordPalette.length === 0) return;
  for (const n of nodes) {
    const chosenChord = chordPalette[Math.floor(Math.random() * chordPalette.length)];
    n.chordName = chosenChord.name;
    n.chordMidi = chosenChord.midi;
  }
} let nextId=0;
  let orbitMix=1, orbitTarget=1, orbitActive=true; // 0=Web, 1=Orbit
  let musicModeActive = false;
  let globalSpeedMultiplier = 1.0;
  let isRendering = false;

  // Audio Scheduler state
  let nextNoteTime = 0.0;
  const schedulerLookahead = 25.0; // ms
  const schedulerInterval = 100.0; // ms
  let schedulerTimerId = 0;

  let dragging=false, dragIndex=-1; // node-drag state
  let draggingPlayheadId = -1;
  let dragAdj = null; // neighbors of dragged node for focus/dim
  let pointerWX=0, pointerWY=0, dragOffX=0, dragOffY=0;
  let dragLastWX=0, dragLastWY=0, dragLastT=0;
  // panning state
  let isPanning=false, panStartSX=0, panStartSY=0, panCamX0=0, panCamY0=0, panLastSX=0, panLastSY=0, panLastT=0, panVelX=0, panVelY=0;

  // ring 페이드 전환 상태
  let ringTransition=null; // {t,dur, prev:Set<number>, next:Set<number>}

  // hover state
  let hoverIndex=-1, mouseSX=0, mouseSY=0, mouseIn=false;

  // Drum machine state
  let currentBeat = 0, beatTime = 0;
  let exportBars = 4;
  let playheads = [{ id: 0, angle: Math.PI / 2 }];
  const STEPS_PER_BAR = 16;
  const TEMPO = 120; // beats per minute (reverted to original)
  const TIME_PER_STEP = 60 / TEMPO / (STEPS_PER_BAR / 4); // Time per 16th note

  function resize(){canvas.width=innerWidth*DPR;canvas.height=innerHeight*DPR;ctx.setTransform(DPR,0,0,DPR,0,0); updateMinScale();} resize(); window.addEventListener('resize',resize);

  // ===== Graph Types =====
  class Node{
    constructor(i){
      this.id=i; this.size=6+Math.random()*3; this.label=String(i);
      this.ring=1; this.radius=0; this.angle=Math.random()*Math.PI*2; this.omega=0;
      this.x=0; this.y=0;           // blended (render)
      this.offX=0; this.offY=0;     // orbit drag offset
      this.freeX=0; this.freeY=0;   // web anchor
      this.vx=0; this.vy=0;         // web velocity
      this.pinned=false;            // web fixed after release
      // animation state
      this.animMode=null;           // 'enter' | 'exit' | null
      this.animT=0; this.animDur=1; // seconds
      this.startX=0; this.startY=0; this.targetX=0; this.targetY=0;
      this.scaleX=1; this.scaleY=1; // squash/stretch for FX
      this.fade=1;                  // edge/node alpha during anim
      // harmony state
this.pitchPrev = NaN;   // last chosen MIDI note
this.pitchNow  = NaN;   // current MIDI note (for audio engines)
this.pitchTarget = NaN; // next bar target (for smooth transitions if needed)
      // UI focus state
      this.uiScale=1; this.uiTint=0;
      // music: chord data is now assigned by assignNodeChords()
      this.chordName = '';
      this.chordMidi = [];
      this.hasPlayedThisFrame = false;
      this._pop = 0; // visual pop on click
      // metadata
      this.createdAt=null;
      this.memo="";
      // orbit relayout target & tween
      this.jitter=(Math.random()*2-1)*R_JITTER; // 개인차
      this.orbitTarget={ring:1, radius:0, omega:0};
      this.orbitMorph=null; // {t,dur, fromR,toR, fromOm,toOm, fromRing,toRing}
    }
  }

  class Edge{ constructor(a,b){ this.a=a; this.b=b; } }

  // quick adjacency helper for focus/dim
  function neighborsOf(idx){
    const s = new Set();
    for (const e of edges) {
      if (e.a === idx) s.add(e.b);
      else if (e.b === idx) s.add(e.a);
    }
    return s;
  }

  // ===== Orbit target 계산 & 적용 =====
  function computeOrbitTargets(){
    const deg=Array(nodes.length).fill(0); for(const e of edges){ if(deg[e.a]!=null) deg[e.a]++; if(deg[e.b]!=null) deg[e.b]++; }
    // choose center as max degree (fallback 0)
    let center=0, maxD=-1; for(let i=0;i<deg.length;i++){ if(deg[i]>maxD){ maxD=deg[i]; center=i; } }
    const uniqueDegs=Array.from(new Set(deg.filter((_,i)=>i!==center))).sort((a,b)=>b-a);
    const d2ring=new Map(); uniqueDegs.forEach((d,idx)=> d2ring.set(d, idx+1));
    for(let i=0;i<nodes.length;i++){
      const n=nodes[i];
      if(i===center){ n.orbitTarget={ring:0, radius:0, omega:0}; }
      else{
        const ring=d2ring.get(deg[i]) || (uniqueDegs.length+1);
        const baseR=R_BASE+(ring-1)*R_STEP;
        const radius=baseR+n.jitter;
        const omega=globalSpeedMultiplier * SPEED_BASE*Math.pow(SPEED_FALLOFF, ring-1)*((ring%2===0)?1:-1);
        n.orbitTarget={ring, radius, omega};
      }
    }
    // ringTransition 준비
    const prev=new Set(nodes.map(n=>n.ring).filter(r=>r>0));
    const next=new Set(nodes.map(n=>n.orbitTarget.ring).filter(r=>r>0));
    ringTransition={t:0, dur:ORBIT_RELAYOUT_DUR, prev, next};
  }

  function applyOrbitTargetsInstant(){ for(const n of nodes){ const t=n.orbitTarget; if(!t) continue; n.ring=t.ring; n.radius=t.radius; n.omega=t.omega; } }

  function startOrbitRelayout(){
    computeOrbitTargets();
    for(const n of nodes){ const t=n.orbitTarget; if(!t) continue; n.orbitMorph={t:0, dur:ORBIT_RELAYOUT_DUR, fromR:n.radius, toR:t.radius, fromOm:n.omega, toOm:t.omega, fromRing:n.ring, toRing:t.ring};
    }
    updateMinScale();
  }

  // ===== Build Graph =====
  function makeGraph(){
    nodes=Array.from({length:N0},(_,i)=>new Node(i));
    edges=[]; const seen=new Set(); const key=(i,j)=> i<j? i+':'+j: j+':'+i;
    // base cycle
    for(let i=0;i<nodes.length;i++){ const j=(i+1)%nodes.length; seen.add(key(i,j)); edges.push(new Edge(i,j)); }
    // random chords
    for(let i=0;i<nodes.length;i++){
      const extra=1+Math.floor(Math.random()*3);
      for(let k=0;k<extra;k++){
        let j=i; while(j===i || seen.has(key(i,j))) j=Math.floor(Math.random()*nodes.length);
        seen.add(key(i,j)); edges.push(new Edge(i,j));
      }
    }
    // 초기 타깃 계산 후 즉시 적용
    computeOrbitTargets();
    applyOrbitTargetsInstant();
    assignNodeChords();
    for(const n of nodes){ const ox=Math.cos(n.angle)*n.radius, oy=Math.sin(n.angle)*n.radius; n.x=ox; n.y=oy; n.freeX=ox; n.freeY=oy; n.vx=0; n.vy=0; n.offX=0; n.offY=0; n.pinned=false; n.animMode=null; n.fade=1; n.scaleX=1; n.scaleY=1; }
    nextId = nodes.length; updateMinScale();
    applyChordToAll(CHORD_TIMELINE[currentBar]);
  }

// ===== Persistence (sessionStorage + import/export) =====
function serializeGraph(){
  return {
    version: 1,
    nodes: nodes.map(n=>({ 
      id:n.id, size:n.size, label:n.label,
      ring:n.ring, radius:n.radius, angle:n.angle, omega:n.omega,
      x:n.x, y:n.y, freeX:n.freeX, freeY:n.freeY,
      pinned:n.pinned, memo:n.memo, createdAt:n.createdAt ? new Date(n.createdAt).toISOString() : null,
    })),
    edges: edges.map(e=>({a:e.a, b:e.b})),
    nextId: nextId,
    camera: { camScale, camX, camY }
  };
}
function saveToSession(){
  try { sessionStorage.setItem(SESSION_KEY, JSON.stringify(serializeGraph())); }
  catch(err){ console.warn('session save failed', err); }
}
function restoreGraph(data){
  try{
    if(!data || typeof data !== 'object') return false;
    if (data.version !== 1) {
      alert('지원하지 않는 JSON 버전입니다.');
      return false;
    }
    const ns = Array.isArray(data.nodes) ? data.nodes : [];
    const es = Array.isArray(data.edges) ? data.edges : [];

      } else if (mouseIn) {
        // Hover 근접도 기반: 가까울수록 크게/밝게
        const p = worldToScreen(n.x, n.y);        // 월드→스크린
        const dx = mouseSX - p.x, dy = mouseSY - p.y;
        const d  = Math.hypot(dx, dy);
        const near = FOCUS_NEAR_PX;               // 기존 파일에 정의됨 (80px)
        const w = Math.max(0, Math.min(1, 1 - d / near)); // 0..1

        scaleTarget = 1 + 0.25 * w;               // 최대 +25%
        tintTarget  = 0.85 * w;                   // 미세 색상 강조
      } else {
        scaleTarget = 1.0; tintTarget = 0.0;
      }

      const k = Math.min(1, HOVER_SPEED * dt);    // 기존 파일에 정의됨 (10)
      // musical click pop easing
      if(n._pop>0){ n._pop = Math.max(0, n._pop - dt*3.0); tintTarget += 0.25*n._pop; scaleTarget += 0.20*n._pop; }
      n.uiScale += (scaleTarget - n.uiScale) * k;
      n.uiTint  += (tintTarget - n.uiTint)  * k;
    }

    // orbit advance & drag-offset decay
    for(const n of nodes){
      n.hasPlayedThisFrame = false; // Reset playhead collision flag

      // --- Angle update and playhead collision ---
      if(orbitActive && !(dragging && orbitMix>0.5 && nodes[dragIndex]===n)) {
        const oldAngle = (n.angle % TWO_PI + TWO_PI) % TWO_PI;
        n.angle += n.omega * dt;
        const newAngle = (n.angle % TWO_PI + TWO_PI) % TWO_PI;

        if (musicModeActive && !n.hasPlayedThisFrame) {
          for (const ph of playheads) {
            const crossed = (n.omega > 0 && oldAngle < ph.angle && newAngle >= ph.angle) ||
                            (n.omega < 0 && oldAngle > ph.angle && newAngle <= ph.angle);
            if (crossed) {
              playChord(n, Audio.ctx.currentTime, Audio.ctx, Audio.master);
              n._pop = 1.0;
              n.hasPlayedThisFrame = true; // Prevent re-triggering on other playheads in same frame
              break; // Exit inner loop once played
            }
          }
        }
      }
      // --- Drag offset decay ---
      if(orbitMix > 0.5) {
        if(!(dragging && nodes[dragIndex]===n)) {
          n.offX *= ORBIT_DRAG_DECAY;
          n.offY *= ORBIT_DRAG_DECAY;
        }
      } else {
        n.offX = 0;
        n.offY = 0;
      }
    }

    // blended output
    for(const n of nodes){ const ox=Math.cos(n.angle)*n.radius, oy=Math.sin(n.angle)*n.radius; const orbitX=ox+n.offX, orbitY=oy+n.offY; const webX=n.freeX, webY=n.freeY; const rx = webX*(1-orbitMix)+orbitX*orbitMix; const ry = webY*(1-orbitMix)+orbitY*orbitMix; if(!n.animMode){ n.x = rx; n.y = ry; } }
  }

  // ===== Draw =====
  function draw(){
    const W=canvas.width/DPR, H=canvas.height/DPR;
    ctx.clearRect(0,0,W,H);
    const {cx,cy}=viewCenter();
    ctx.save();
    ctx.translate(cx,cy);
    ctx.scale(camScale,camScale);
    ctx.translate(-camX,-camY);
    ctx.translate(wobbleX, wobbleY);
    // orbit rings — 부드러운 등장/사라짐
    const baseAlpha = 0.18*orbitMix;
    if(ringTransition){ const s=easeInOut(ringTransition.t); ctx.lineWidth=1/camScale; for(const r of ringTransition.prev){ const rad=R_BASE+(r-1)*R_STEP; ctx.strokeStyle=`rgba(124,192,255,${(baseAlpha*(1-s)).toFixed(3)})`; ctx.beginPath(); ctx.arc(0,0,rad,0,Math.PI*2); ctx.stroke(); } for(const r of ringTransition.next){ const rad=R_BASE+(r-1)*R_STEP; ctx.strokeStyle=`rgba(124,192,255,${(baseAlpha*s).toFixed(3)})`; ctx.beginPath(); ctx.arc(0,0,rad,0,Math.PI*2); ctx.stroke(); } } else if(orbitMix>0) { const used=new Set(nodes.filter(n=>n.ring>0).map(n=>n.ring)); ctx.lineWidth=1/camScale; ctx.strokeStyle=`rgba(124,192,255,${baseAlpha.toFixed(3)})`; for(const r of Array.from(used).sort((a,b)=>a-b)){ const rad=R_BASE+(r-1)*R_STEP; ctx.beginPath(); ctx.arc(0,0,rad,0,Math.PI*2); ctx.stroke(); } }

    // Playhead lines
    if (musicModeActive && orbitMix > 0.2) {
      const r = computeContentRadius();
      ctx.save();
      ctx.lineWidth = 1.5 / camScale;
      ctx.setLineDash([4 / camScale, 7 / camScale]);

      for (const ph of playheads) {
        ctx.strokeStyle = `rgba(255, 255, 255, ${0.3 * orbitMix * orbitMix})`;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(r * Math.cos(ph.angle), r * Math.sin(ph.angle));
        ctx.stroke();
      }
      ctx.restore();
    }

    // edges
    if(showEdges){ ctx.lineWidth=1.1/camScale; for(const e of edges){ const a=nodes[e.a], b=nodes[e.b]; let alpha=Math.min(a?.fade??1,b?.fade??1)*0.35; if (dragging && dragIndex >= 0) { const hit = (e.a === dragIndex || e.b === dragIndex); alpha = hit ? 0.70 : 0.10; } if(!a||!b||alpha<=0) continue; ctx.strokeStyle=`rgba(124,192,255,${alpha.toFixed(3)})`; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); } }

    // nodes
    for (let i=0;i<nodes.length;i++){

      const alpha = n.fade; if(alpha<=0) continue;

      const isDrag = dragging && i===dragIndex;
      const isAdj  = dragging && dragAdj && dragAdj.has(i);

      ctx.save();
      ctx.translate(n.x,n.y);
      ctx.scale(n.scaleX, n.scaleY);

      const s = n.uiScale;
      const outer = (n.size+6)*s;
      const inner = n.size*s;

      // subtle shadow for drag emphasis
      if (isDrag || isAdj) {
        ctx.shadowColor = 'rgba(0,0,0,0.35)';
        ctx.shadowBlur  = isDrag ? 12 : 8;
      } else {
        ctx.shadowBlur = 0;
      }

      // outer glow
      ctx.beginPath();
      ctx.fillStyle=`rgba(124,192,255,${(0.16*alpha).toFixed(3)})`;
      ctx.arc(0,0,outer,0,Math.PI*2);
      ctx.fill();

      // inner fill with proximity tint (uiTint는 step에서 계산됨)
      const t = 0.7 * n.uiTint;
      const r = Math.round(207*(1-t) + 255*t);
      const g = Math.round(232*(1-t) + 235*t);
      const b = Math.round(255*(1-t) + 200*t);
      ctx.beginPath();
      ctx.fillStyle=`rgba(${r},${g},${b},${alpha.toFixed(3)})`;
      ctx.arc(0,0,inner,0,Math.PI*2);
      ctx.fill();

      // outline when dragging for clarity (화면 고정 두께)
      if (isDrag || isAdj) {
        ctx.beginPath();
        ctx.lineWidth = (isDrag ? 2.0 : 1.4) / camScale;
        ctx.strokeStyle = isDrag ? 'rgba(200,235,255,0.95)' : 'rgba(180,220,255,0.75)';
        ctx.arc(0,0,inner + (isDrag ? 1.0 : 0.5), 0, Math.PI*2);
        ctx.stroke();
      }

      ctx.restore();
    }
    // === HUD overlay (screen space) ===
    if (dragging && dragIndex >= 0) {
      const n = nodes[dragIndex];
      const p = worldToScreen(n.x, n.y);
      drawSpeechBubbleHUD(p.x, p.y, n);
    }

    ctx.restore(); }

// ===== HUD (speech bubble) =====
function drawSpeechBubbleHUD(sx, sy, node){
  const padX=10, padY=8, maxW=240, lineH=16;
  ctx.save();
  ctx.setTransform(DPR,0,0,DPR,0,0); // screen space(줌 무시)
  ctx.font = '12px "Noto Sans KR", sans-serif';

  const dt   = node.createdAt ? new Date(node.createdAt).toLocaleString('ko-KR') : '생성시간: -';
  const memo = node.memo || '(메모 없음)';
  const lines = wrapText(['생성: ' + dt, '메모: ' + memo], maxW, ctx);

  const widths   = lines.map(t => ctx.measureText(t).width);
  const maxWidth = widths.length ? Math.max.apply(null, widths) : 0;
  const boxW     = maxWidth + padX*2;
  const boxH     = lineH*lines.length + padY*2;

  const offsetX = 16, offsetY = -24; // node 오른쪽 위로 배치
  const x = sx + offsetX, y = sy + offsetY - boxH;

  // bubble
  ctx.fillStyle   = 'rgba(20,28,36,0.96)';
  ctx.strokeStyle = 'rgba(124,192,255,0.4)';
  roundRect(ctx, x, y, boxW, boxH, 10);
  ctx.fill(); ctx.stroke();

  // text
  ctx.fillStyle = '#cfe8ff';
  let ty = y + padY + 12;
  for (let i=0; i<lines.length; i++) {
    ctx.fillText(lines[i], x+padX, ty);
    ty += lineH;
  }
  ctx.restore();
}

function wrapText(inputLines, maxW, c){
  const out=[];
  for(let k=0;k<inputLines.length;k++){
    const raw=String(inputLines[k]);
    const words=raw.split(/\s+/);
    let cur='';
    for(let wi=0;wi<words.length;wi++){
      const w=words[wi];
      const test = cur ? cur+' '+w : w;
      if(c.measureText(test).width > maxW){
        if(cur) out.push(cur);
        cur=w;
      } else {
        cur=test;
      }
    }
    if(cur) out.push(cur);
  }
  return out.slice(0,4); // 최대 4줄
}

function roundRect(c, x, y, w, h, r){
  c.beginPath();
  c.moveTo(x+r, y);
  c.arcTo(x+w, y,   x+w, y+h, r);
  c.arcTo(x+w, y+h, x,   y+h, r);
  c.arcTo(x,   y+h, x,   y,   r);
  c.arcTo(x,   y,   x+w, y,   r);
  c.closePath();
}

  // ===== Loop =====
  let last = performance.now();
function loop(now){
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  if (isPlaying && now >= nextBarDue) {
    // 한 마디 경과
    nextBarDue = now + BEATS_PER_BAR * MS_PER_BEAT();

    // 현재 화음 내에서 마디 진행
    phraseBar = (phraseBar + 1) % HARMONY_HOLDBARS;

    // phraseBar가 0으로 되돌아올 때만 다음 화음으로
    if (phraseBar === 0) {
      currentBar = (currentBar + 1) % CHORD_TIMELINE.length;
      applyChordToAll(CHORD_TIMELINE[currentBar]);
    }
  }
  step(dt);
  draw();
  requestAnimationFrame(loop);
}

function applyChordToAll(degree){
  const chord = degreeToChord(degree);
  for(const n of nodes){
    const off = ringRoleOffset(n);
    // candidate pitches around role octave
    const candidates = [];
    for(const co of chord){ candidates.push(co+off-12, co+off, co+off+12); }
    const chosen = nearestPitch(n.pitchPrev, candidates);
    n.pitchPrev = n.pitchNow = chosen;
  }
}

// ===== Music playback =====
function playChord(node, t0, ctx, masterNode){
  // Create a panner for this specific chord
  const panner = ctx.createStereoPanner();
  panner.pan.value = Math.cos(node.angle);
  panner.connect(masterNode);

  // Harmonics definition: [amplitude, type]
  const harmonics = [
    [0.6, 'triangle'], // Fundamental
    [0.4, 'sine'],     // 2nd harmonic (octave)
    [0.2, 'sine'],     // 3rd harmonic (octave + fifth)
    [0.1, 'sine']      // 4th harmonic (2 octaves)
  ];
  const detunes = [-5, 0, 4]; // Richer detuning

  const notesToPlay = Number.isFinite(node.pitchNow) ? [node.pitchNow] : node.chordMidi;

  notesToPlay.forEach((m, idx)=>{
    const freq = midiToFreq(m);
    const noteGain = ctx.createGain();

    // A more piano-like ADSR Envelope for the entire note
    const g = noteGain.gain;
    g.setValueAtTime(0.0001, t0);
    g.linearRampToValueAtTime(0.7, t0 + 0.02); // Quick attack
    g.exponentialRampToValueAtTime(0.15, t0 + 1.2 * 0.6); // Decay
    g.linearRampToValueAtTime(0.0001, t0 + 1.2); // Release

    harmonics.forEach((h, i) => {
      const osc = ctx.createOscillator();
      osc.type = h[1];
      osc.frequency.value = freq * (i + 1);

      // Apply small detune to chord notes for richness
      if(idx < detunes.length) osc.detune.value = detunes[idx] + i*2;

      // Create a gain node for this specific harmonic to control its volume
      const partialGain = ctx.createGain();
      partialGain.gain.value = h[0];

      osc.connect(partialGain);
      partialGain.connect(noteGain);

      osc.start(t0);
      osc.stop(t0 + 1.2 + 0.1);
    });

    noteGain.connect(panner);
  });
}


// Helper to convert AudioBuffer to WAV Blob
function bufferToWav(buffer) {
  const numOfChan = buffer.numberOfChannels,
        btwLength = buffer.length * numOfChan * 2 + 44,
        btwArrBuff = new ArrayBuffer(btwLength),
        btwView = new DataView(btwArrBuff),
        btwChans = [];
  let offset = 0;
  const writeString = (str) => {
    for (let i = 0; i < str.length; i++) btwView.setUint8(offset + i, str.charCodeAt(i));
    offset += str.length;
  };

  // Write WAV header
  writeString('RIFF');
  btwView.setUint32(offset, btwLength - 8, true); offset += 4;
  writeString('WAVE');
  btwView.setUint32(offset, 16, true); offset += 4;
  btwView.setUint16(offset, 1, true); offset += 2;
  btwView.setUint16(offset, numOfChan, true); offset += 2;
  btwView.setUint32(offset, buffer.sampleRate, true); offset += 4;
  btwView.setUint32(offset, buffer.sampleRate * numOfChan * 2, true); offset += 4;
  btwView.setUint16(offset, numOfChan * 2, true); offset += 2;
  btwView.setUint16(offset, 16, true); offset += 2;
  writeString('data');
  btwView.setUint32(offset, buffer.length * numOfChan * 2, true); offset += 4;

  // Write audio data
  for (let i = 0; i < numOfChan; i++) btwChans.push(buffer.getChannelData(i));

  for (let i = 0; i < buffer.length; i++) {
    for (let c = 0; c < numOfChan; c++) {
      let sample = Math.max(-1, Math.min(1, btwChans[c][i])); // Clamp to -1, 1
      sample = (sample < 0 ? sample * 0x8000 : sample * 0x7FFF) | 0; // Convert to 16-bit PCM
      btwView.setInt16(offset, sample, true); offset += 2;
    }
  }

  return new Blob([btwArrBuff], { type: 'audio/wav' });
}

// Bjorklund's algorithm for Euclidean rhythms
function getEuclideanRhythm(beats, steps) {
    if (beats < 0 || steps < 0 || beats > steps) return [];
    const pattern = [];
    for (let i = 0; i < steps; i++) {
        pattern.push(Math.floor(i * beats / steps) !== Math.floor((i - 1) * beats / steps) ? 1 : 0);
    }
    return pattern;
}

    }

// Function to export audio
async function exportAudio() {
  if (isRendering) return; // Prevent multiple renders
  isRendering = true;
  const exportButton = document.getElementById('exportWav');
  exportButton.textContent = 'Rendering...';
  exportButton.disabled = true;

  // 1. Determine export duration
  const renderDuration = exportBars * STEPS_PER_BAR * TIME_PER_STEP;
  console.log(`Rendering audio for ${exportBars} bars (${renderDuration.toFixed(2)} seconds).`);

  // 2. Create OfflineAudioContext
  const offlineCtx = new OfflineAudioContext(2, Audio.ctx.sampleRate * renderDuration, Audio.ctx.sampleRate);

  // 3. Replicate the audio graph (master chain)
  const offlineMaster = offlineCtx.createGain();
  offlineMaster.gain.value = Audio.master.gain.value;

  const offlineReverb = offlineCtx.createConvolver();
  offlineReverb.buffer = Audio.createImpulseResponse(offlineCtx);

  const offlineCompressor = offlineCtx.createDynamicsCompressor();
  offlineCompressor.threshold.value = Audio.compressor.threshold.value;
  offlineCompressor.knee.value = Audio.compressor.knee.value;
  offlineCompressor.ratio.value = Audio.compressor.ratio.value;
  offlineCompressor.attack.value = Audio.compressor.attack.value;
  offlineCompressor.release.value = Audio.compressor.release.value;

  offlineMaster.connect(offlineReverb);
  offlineReverb.connect(offlineCompressor);
  offlineCompressor.connect(offlineCtx.destination);

  // 4. Simulate the entire sequence and schedule notes
  const simulatedNodes = JSON.parse(JSON.stringify(nodes)); // Deep copy nodes to simulate offline
  const simulatedPlayheads = JSON.parse(JSON.stringify(playheads)); // Deep copy playheads

  let simulatedStepTime = 0;
  let simulatedCurrentStep = 0;

  const dt = 0.01; // Simulation step time (e.g., 10ms)
  for (let t = 0; t < renderDuration; t += dt) {
    // Simulate drum sequencer
    simulatedStepTime += dt;
    if (simulatedStepTime >= TIME_PER_STEP) {
      simulatedStepTime -= TIME_PER_STEP;
      simulatedCurrentStep = (simulatedCurrentStep + 1) % STEPS_PER_BAR;
      const scheduledTime = t;

    }

    // Simulate node movement and playhead crossings
    for (const n of simulatedNodes) {
      const oldAngle = (n.angle % TWO_PI + TWO_PI) % TWO_PI;
      n.angle += n.omega * dt * globalSpeedMultiplier; // Apply global speed multiplier
      const newAngle = (n.angle % TWO_PI + TWO_PI) % TWO_PI;

      for (const ph of simulatedPlayheads) {
        const crossed = (n.omega * globalSpeedMultiplier > 0 && oldAngle < ph.angle && newAngle >= ph.angle) ||
                        (n.omega * globalSpeedMultiplier < 0 && oldAngle > ph.angle && newAngle <= ph.angle);
        if (crossed) {
          // Apply microtiming to chord playback as well
          const chordScheduledTime = t + (Math.random() * 2 - 1) * 0.008; // Apply microtiming directly
          playChord(n, chordScheduledTime, offlineCtx, offlineMaster);
        }
      }
    }
  }

  // 5. Start rendering
  const renderedBuffer = await offlineCtx.startRendering();

  // 6. Convert to WAV and download
  const wavBlob = bufferToWav(renderedBuffer);
  const url = URL.createObjectURL(wavBlob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().replace(/[:.]/g,'-');
  a.href = url;
  a.download = `orbit_graph_audio-${stamp}.wav`;
  a.click();
  URL.revokeObjectURL(url);

  isRendering = false;
  exportButton.textContent = 'Export WAV';
  exportButton.disabled = false;
  alert('Audio exported successfully!');
}

  function onContextMenu(e){

          closest = i;

  function shufflePositions(){
    assignNodeChords(); // Generate new harmony first

    const R = computeContentRadius();
    const D = 0.9; // duration seconds

    // No drum patterns created

    // 2. Group nodes by ring
    const nodesByRing = new Map();
    for(const n of nodes){
      const ring = n.orbitTarget.ring; // Use target ring for consistency
      if(!nodesByRing.has(ring)) nodesByRing.set(ring, []);
      nodesByRing.get(ring).push(n);
    }

    // 3. Assign rhythmic positions to nodes on each ring
    const ringPatterns = [
      { beats: 3, steps: STEPS_PER_BAR }, // Ring 1
      { beats: 5, steps: STEPS_PER_BAR }, // Ring 2
      { beats: 7, steps: STEPS_PER_BAR }, // Ring 3
      { beats: 6, steps: STEPS_PER_BAR }, // Ring 4
    ];

    for(const [ring, ringNodes] of nodesByRing.entries()){
      if(ring === 0) continue; // Skip center node

      const patternDef = ringPatterns[(ring - 1) % ringPatterns.length];
      const nodePattern = getEuclideanRhythm(patternDef.beats, patternDef.steps);
      const onBeatIndices = [];
      nodePattern.forEach((v, i) => { if(v === 1) onBeatIndices.push(i); });

      if(onBeatIndices.length === 0) continue;

      ringNodes.forEach((n, i) => {
        const beatIndex = onBeatIndices[i % onBeatIndices.length];
        const targetAngle = (beatIndex / patternDef.steps) * TWO_PI;

        // --- Standard shuffle logic ---
        const startAngle  = n.angle;
        const a = Math.random() * Math.PI * 2;
        const rr = 40 + Math.random() * R;
        const targetFX = Math.cos(a) * rr, targetFY = Math.sin(a) * rr;
        const startFX = n.freeX,        startFY = n.freeY;

        n.shuffle = {
          t: 0, dur: D,
          startAngle, targetAngle,
          startFX, startFY, targetFX, targetFY,
        };

        n.vx = 0; n.vy = 0;
        n.offX = 0; n.offY = 0;
      });
    }

    computeOrbitTargets();
    saveToSession();
  }
