<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HiChord</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/15.3.3/Tone.js"></script>
  <link rel="stylesheet" href="hichord.css">
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <span id="recDot" class="recInd"></span>
      <button id="menuBtn" class="menuBtn" aria-expanded="false" aria-controls="panelWrap" title="메뉴 열기/닫기">≡ 메뉴</button>
    </div>

    <!-- 7 Pads -->
    <div class="card pianoCard">
      <div class="pads" aria-label="Seven Chord Pads">
        <button class="pad" data-slot="K0"><div class="kcap">q</div><div class="lab">I</div></button>
        <button class="pad" data-slot="K1"><div class="kcap">w</div><div class="lab">ii</div></button>
        <button class="pad" data-slot="K2"><div class="kcap">e</div><div class="lab">IV</div></button>
        <button class="pad" data-slot="K3"><div class="kcap">r</div><div class="lab">V</div></button>
        <button class="pad" data-slot="K4"><div class="kcap">2</div><div class="lab">♭II</div></button>
        <button class="pad" data-slot="K5"><div class="kcap">3</div><div class="lab">♭III</div></button>
        <button class="pad" data-slot="K6"><div class="kcap">4</div><div class="lab">♯IV</div></button>
      </div>
    </div>

    <!-- Hidden panel: status/presets/tracks -->
    <div id="panelWrap" class="panelWrap">
      <div class="panel" id="status">
        <div class="pill">Key: <b id="keyName">C</b></div>
        <div class="pill">Mode: <b id="modeName">Major</b></div>
        <div class="pill">Quality: <b id="qualityName">Triad</b></div>
        <div class="pill">Inversion: <b id="invName">Root</b></div>
        <div class="pill">Octave: <b id="octName">4</b></div>
        <div class="pill">Preset: <b id="presetName">C</b></div>
        <div class="pill">BPM: <b id="bpmName">100</b></div>
        <div class="pill">REC: <b id="recName">Idle</b></div>
      </div>

      <div class="card">
        <div style="margin-bottom:8px; color:#c7d6e7; font-weight:700">8방향 프리셋</div>
        <div class="compass" id="compass">
          <div class="dir" data-dir="NW"><div>↖ NW</div><div class="help">u</div></div>
          <div class="dir" data-dir="N"><div>↑ N</div><div class="help">i</div></div>
          <div class="dir" data-dir="NE"><div>↗ NE</div><div class="help">o</div></div>
          <div class="dir" data-dir="W"><div>← W</div><div class="help">j</div></div>
          <div class="dir active" data-dir="C"><div>● C</div><div class="help">현재</div></div>
          <div class="dir" data-dir="E"><div>→ E</div><div class="help">l</div></div>
          <div class="dir" data-dir="SW"><div>↙ SW</div><div class="help">m</div></div>
          <div class="dir" data-dir="S"><div>↓ S</div><div class="help">, (Drum)</div></div>
          <div class="dir" data-dir="SE"><div>↘ SE</div><div class="help">.</div></div>
        </div>
      </div>

      <div class="card opko" style="margin-top:12px">
        <div class="opko-hdr">Drum Pads</div>
        <div class="opko-grid">
          <button class="ko-pad" data-ko="kick">KICK</button>
          <button class="ko-pad" data-ko="snare">SNARE</button>
          <button class="ko-pad" data-ko="hat">HAT</button>
          <button class="ko-pad" data-ko="crunch">CRUNCH</button>
          <button class="ko-pad" data-ko="clap">CLAP</button>
          <button class="ko-pad" data-ko="bell">BELL</button>
        </div>
      </div>

      <div class="card" style="margin-top:12px">
        <div style="margin-bottom:8px; color:#c7d6e7; font-weight:700">Tracks</div>
        <div class="tracks" id="tracks"></div>
      </div>
    </div>
  </div>

  <script src="hichord.js"></script>
</body>
</html>
