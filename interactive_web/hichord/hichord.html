<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HiChord</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/15.3.3/Tone.js"></script>
  <link rel="stylesheet" href="hichord.css">
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <span id="recDot" class="recInd"></span>
      <button id="menuBtn" class="menuBtn" aria-expanded="false" aria-controls="panelWrap" title="메뉴 열기/닫기">≡ 메뉴</button>
    </div>

    <!-- 7 Pads -->
    <div class="card pianoCard">
      <div class="pads" aria-label="Seven Chord Pads">
        <button class="pad" data-slot="K0"><div class="kcap">q</div><div class="lab">I</div></button>
        <button class="pad" data-slot="K1"><div class="kcap">w</div><div class="lab">ii</div></button>
        <button class="pad" data-slot="K2"><div class="kcap">e</div><div class="lab">IV</div></button>
        <button class="pad" data-slot="K3"><div class="kcap">r</div><div class="lab">V</div></button>
        <button class="pad" data-slot="K4"><div class="kcap">2</div><div class="lab">♭II</div></button>
        <button class="pad" data-slot="K5"><div class="kcap">3</div><div class="lab">♭III</div></button>
        <button class="pad" data-slot="K6"><div class="kcap">4</div><div class="lab">♯IV</div></button>
      </div>
    </div>

    <!-- Hidden panel: status/presets/tracks -->
    <div id="panelWrap" class="panelWrap">
      <div class="panel" id="status">
        <div class="pill">Key: <b id="keyName">C</b></div>
        <div class="pill">Mode: <b id="modeName">Major</b></div>
        <div class="pill">Quality: <b id="qualityName">Triad</b></div>
        <div class="pill">Inversion: <b id="invName">Root</b></div>
        <div class="pill">Octave: <b id="octName">4</b></div>
        <div class="pill">Preset: <b id="presetName">C</b></div>
        <div class="pill">BPM: <b id="bpmName">100</b></div>
        <div class="pill">REC: <b id="recName">Idle</b></div>
      </div>

      <div class="card">
        <div style="margin-bottom:8px; color:#c7d6e7; font-weight:700">8방향 프리셋</div>
        <div class="compass" id="compass">
          <div class="dir" data-dir="NW"><div>↖ NW</div><div class="help">u</div></div>
          <div class="dir" data-dir="N"><div>↑ N</div><div class="help">i</div></div>
          <div class="dir" data-dir="NE"><div>↗ NE</div><div class="help">o</div></div>
          <div class="dir" data-dir="W"><div>← W</div><div class="help">j</div></div>
          <div class="dir active" data-dir="C"><div>● C</div><div class="help">현재</div></div>
          <div class="dir" data-dir="E"><div>→ E</div><div class="help">l</div></div>
          <div class="dir" data-dir="SW"><div>↙ SW</div><div class="help">m</div></div>
          <div class="dir" data-dir="S"><div>↓ S</div><div class="help">, (Drum)</div></div>
          <div class="dir" data-dir="SE"><div>↘ SE</div><div class="help">.</div></div>
        </div>
      </div>

      <div class="card opko" style="margin-top:12px">
        <div class="opko-hdr">OP-KO Drum</div>
        <div class="opko-grid">
          <button class="ko-pad" data-ko="kck">KICK</button>
          <button class="ko-pad" data-ko="snr">SNARE</button>
          <button class="ko-pad" data-ko="cht">CH-HAT</button>
          <button class="ko-pad" data-ko="ohat">OH-HAT</button>
          <button class="ko-pad" data-ko="clp">CLAP</button>
          <button class="ko-pad" data-ko="tom">TOM</button>
          <button class="ko-pad" data-ko="rid">RIDE</button>
          <button class="ko-pad" data-ko="fx">FX</button>
        </div>
        <!-- Bank / Sample Trim -->
        <div class="opko-row">
          <div class="bank">
            <span class="help">BANK</span>
            <div class="bank-btns">
              <button class="bank-btn" data-bank="1">1</button>
              <button class="bank-btn" data-bank="2">2</button>
              <button class="bank-btn" data-bank="3">3</button>
              <button class="bank-btn" data-bank="4">4</button>
            </div>
            <span class="help">숫자키 1–4 지원</span>
          </div>
          <div class="trim">
            <label>Slot
              <select id="trimSlot">
                <option value="kck">KICK</option>
                <option value="snr">SNARE</option>
                <option value="cht">CH-HAT</option>
                <option value="ohat">OH-HAT</option>
                <option value="clp">CLAP</option>
                <option value="tom">TOM</option>
                <option value="rid">RIDE</option>
              </select>
            </label>
            <label>Start <input id="trimStart" type="range" min="0" max="0.95" step="0.01"></label>
            <label>End <input id="trimEnd" type="range" min="0.05" max="1" step="0.01" value="1"></label>
            <label class="rev"><input id="trimRev" type="checkbox"> Reverse</label>
          </div>
        </div>

        <!-- FX knobs -->
        <div class="opko-fxctrl">
          <div class="knob">
            <label>STUT</label>
            <input class="kn stut" type="range" min="0" max="1" step="0.01" value="0">
          </div>
          <div class="knob">
            <label>GATE</label>
            <input class="kn gate" type="range" min="0" max="1" step="0.01" value="0">
          </div>
          <div class="knob">
            <label>WOW</label>
            <input class="kn wow"  type="range" min="0" max="1" step="0.01" value="0">
          </div>
          <div class="knob">
            <label>BITS</label>
            <input class="kn bits" type="range" min="4" max="12" step="1" value="8">
          </div>
          <div class="knob">
            <label>LPF</label>
            <input class="kn lpf"  type="range" min="800" max="12000" step="50" value="12000">
          </div>
          <div class="knob">
            <label>REV</label>
            <input class="kn rev"  type="range" min="0" max="0.5" step="0.01" value="0">
          </div>
        </div>

        <!-- Step Repeat Grid -->
        <div class="step-grid">
          <div class="sg-row">
            <span class="help">STEP REPEAT (16)</span>
            <select id="sgTarget">
              <option value="snr">SNARE</option>
              <option value="cht">CH-HAT</option>
              <option value="ohat">OH-HAT</option>
              <option value="clp">CLAP</option>
              <option value="kck">KICK</option>
            </select>
            <span class="help">분해능: 16분(루프/트랜스포트 기준)</span>
          </div>
          <div class="sg-grid" id="sgGrid">
            <!-- JS가 16 버튼 생성 -->
          </div>
        </div>
        <div class="opko-fx">
          <div class="fx-row">
            <button class="fx" data-fx="stut" title="Stutter (A)">STUT</button>
            <button class="fx" data-fx="gate" title="Gater (S)">GATE</button>
            <button class="fx" data-fx="tape" title="Tape-Stop (D)">TAPE</button>
            <button class="fx" data-fx="wow"  title="Wow/Flutter (F)">WOW</button>
            <button class="fx" data-fx="bits" title="Bit-Crush (G)">BITS</button>
            <button class="fx" data-fx="lpf"  title="LP Sweep (H)">LPF</button>
            <button class="fx" data-fx="rev"  title="Short Verb (J)">REV</button>
            <button class="fx" data-fx="pump" title="Sidechain Pump (K)">PUMP</button>
          </div>
          <div class="help" style="margin-top:6px">드럼 프리셋(콤마 <span class="kbd">,</span>) 상태에서 패드/FX 사용 · 단축키: A S D F G H J K</div>
        </div>
      </div>

      <div class="card" style="margin-top:12px">
        <div style="margin-bottom:8px; color:#c7d6e7; font-weight:700">Tracks</div>
        <div class="tracks" id="tracks"></div>
      </div>
    </div>
  </div>

  <script src="hichord.js"></script>
</body>
</html>
